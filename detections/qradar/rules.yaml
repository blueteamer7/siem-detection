# QRD-001: LSASS Memory Dump (T1003.001)
- id: QRD-001
  title: "LSASS Memory Dump Detection"
  description: "Detects attempts to dump LSASS memory using access mask 0x1fffff"
  aql: "SELECT * FROM events WHERE (eventid='4656' OR eventid='4663') AND \"Target Process\" IMATCHES '.*lsass\.exe' AND \"Access Mask\"='0x1fffff'"

# QRD-002: Suspicious PowerShell (T1059.001)
- id: QRD-002
  title: "Suspicious PowerShell Execution"
  aql: "SELECT * FROM events WHERE \"Process Name\" ILIKE '%powershell.exe%' AND (\"Process Command Line\" ILIKE '%-enc%' OR \"Process Command Line\" ILIKE '%DownloadString%')"

# QRD-003: External RDP Bruteforce (T1110.001)
- id: QRD-003
  title: "RDP Bruteforce from External IP"
  aql: "SELECT sourceip, count(*) as cnt FROM events WHERE eventid='4625' AND \"Logon Type\"='10' GROUP BY sourceip HAVING cnt > 15 LAST 5 MINUTES"

# QRD-004: Bruteforce Followed by Success (T1110)
- id: QRD-004
  title: "Success Login After Multiple Failures"
  aql: "SELECT username, count(*) FROM events WHERE eventid IN ('4624','4625') GROUP BY username HAVING count(eventid='4625') > 5 AND count(eventid='4624') > 0 LAST 15 MINUTES"

# QRD-005: Security Log Cleared (T1070.001)
- id: QRD-005
  title: "Windows Security Log Cleared"
  aql: "SELECT * FROM events WHERE eventid='1102' OR eventid='104'"

# QRD-006: Privileged Group Change (T1098)
- id: QRD-006
  title: "Sensitive Group Membership Change"
  aql: "SELECT * FROM events WHERE eventid IN ('4728','4732','4756') AND \"Target Group\" ILIKE '%Admin%'"

# QRD-007: New Admin Account (T1136.001)
- id: QRD-007
  title: "User Created and Added to Admin Group"
  aql: "SELECT username FROM events WHERE eventid IN ('4720','4732') GROUP BY \"Target UserName\" HAVING count(eventid='4720')>0 AND count(eventid='4732')>0 LAST 1 HOUR"

# QRD-008: RDP Tunneling (T1572)
- id: QRD-008
  title: "Potential RDP Tunneling"
  aql: "SELECT * FROM events WHERE destinationport='3389' AND sourceip='127.0.0.1'"

# QRD-009: Rare Child Process of Web Server (T1505.003)
- id: QRD-009
  title: "Web Server Spawning Shell"
  aql: "SELECT * FROM events WHERE (\"Parent Process Name\" ILIKE '%w3wp.exe%' OR \"Parent Process Name\" ILIKE '%httpd%') AND \"Process Name\" IN ('cmd.exe', 'powershell.exe')"

# QRD-010: Scheduled Task Persistence (T1053.005)
- id: QRD-010
  title: "Suspicious Scheduled Task Creation"
  aql: "SELECT * FROM events WHERE \"Process Command Line\" ILIKE '%schtasks /create%' AND \"Process Command Line\" ILIKE '%.exe%'"
