name: Sync to QRadar
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11'

      - name: Install dependencies
        [cite_start]run: pip install requests pyyaml urllib3 [cite: 62]

      - name: Run Sync Script
        env:
          QRADAR_HOST: ${{ secrets.QRADAR_HOST }}
          QRADAR_SEC_TOKEN: ${{ secrets.QRADAR_SEC_TOKEN }}
        run: python scripts/qradar_sync.py detections/qradar/
